  event:
    - cron
    - push
    - tag

---
kind: pipeline
name: docker-manifest

platform:
  os: linux
  arch: arm64

steps:
  - name: publish on Docker Hub
    image: plugins/manifest
    settings:
      auto_tag: true
      ignore_missing: true
      spec: .drone-manifest.yml
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

trigger:
  branch:
    exclude:
      - renovate/*
  event:
    - cron
    - push
    - tag

depends_on:
  - build-amd64
  - build-arm64
