      - ln deploy/happydomain-${DRONE_STAGE_OS}-${DRONE_STAGE_ARCH} happydomain
    environment:
      CGO_ENABLED: 0
    when:
      event:
        - tag

  - name: vet and tests
    image: golang:1-alpine
    commands:
      - apk --no-cache add build-base git
      - go vet ./...
      - go test ./...
    environment:
      CGO_ENABLED: 0

  - name: build-commit macOS
    image: golang:1-alpine
    commands:
      - apk add --no-cache git
      - go build -tags netgo,swagger,web -ldflags '-w -X "main.Version=${DRONE_BRANCH}-${DRONE_COMMIT}" -X main.build=${DRONE_BUILD_NUMBER}' -o deploy/happydomain-darwin-${DRONE_STAGE_ARCH} ./cmd/happyDomain/
    environment:
      CGO_ENABLED: 0
      GOOS: darwin
      GOARCH: arm64
    when:
      event:
        exclude:
          - tag

  - name: build-tag macOS
    image: golang:1-alpine
    commands:
      - apk add --no-cache git
      - go build -tags netgo,swagger,web -ldflags '-w -X "main.Version=${DRONE_TAG##v}" -X main.build=${DRONE_BUILD_NUMBER}' -o deploy/happydomain-darwin-${DRONE_STAGE_ARCH} ./cmd/happyDomain/
    environment:
      CGO_ENABLED: 0
      GOOS: darwin
      GOARCH: arm64
    when:
      event:
        - tag

  - name: deploy
    image: plugins/s3
    settings:
      endpoint: https://blob.nemunai.re
      path_style: true
      region: garage
      bucket: happydomain-dl
      access_key:
        from_secret: s3_access_key
      secret_key:
        from_secret: s3_secret_key
      source: deploy/*
      target: /${DRONE_BRANCH//\//-}/
      strip_prefix: deploy/
    when:
      event:
        - push
      branch:
        exclude:
          - renovate/*

  - name: deploy release
    image: plugins/s3
    settings:
      endpoint: https://blob.nemunai.re
      path_style: true
      region: garage
      bucket: happydomain-dl
      access_key:
        from_secret: s3_access_key
      secret_key:
        from_secret: s3_secret_key
      source: deploy/*
      target: /${DRONE_TAG}/
      strip_prefix: deploy/
    when:
      event:
        - tag

  - name: publish on Docker Hub
    image: plugins/docker
    settings:
      repo: happydomain/happydomain
      auto_tag: true
      auto_tag_suffix: ${DRONE_STAGE_OS}-${DRONE_STAGE_ARCH}
      dockerfile: Dockerfile-builded
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password

  - name: publish release on gitea
    image: plugins/gitea-release
    settings:
      api_key:
        from_secret: git_nemunaire_token
      base_url: https://git.nemunai.re
      draft: true
      prerelease: true
      files: deploy/*
    when:
      event:
        - tag

  - name: publish release on codeberg
    image: plugins/gitea-release
    settings:
      api_key:
        from_secret: codeberg_token
      base_url: https://codeberg.org
      draft: true
      prerelease: true
      files: deploy/*
    when:
      event:
        - tag

  - name: publish release on github
    image: plugins/github-release
    settings:
      api_key:
        from_secret: github_release_token
      draft: true
      prerelease: true
      github_url: https://github.com
      files: deploy/*
    when:
      event:
        - tag

